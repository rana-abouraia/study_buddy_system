      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4007
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4007:4007"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  api-gateway:
    build: ./backend/api-gateway
    env_file: ./backend/.env
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:4001
      PROFILE_SERVICE_URL: http://profile-service:4002
      AVAILABILITY_SERVICE_URL: http://availability-service:4003
      MATCHING_SERVICE_URL: http://matching-service:4004
      SESSION_SERVICE_URL: http://session-service:4005
      NOTIFICATION_SERVICE_URL: http://notification-service:4006
      MESSAGING_SERVICE_URL: http://messaging-service:4007
    ports:
      - "4000:4000"
    depends_on:
      user-service:
        condition: service_started
      profile-service:
        condition: service_started
      availability-service:
        condition: service_started
      matching-service:
        condition: service_started
      session-service:
        condition: service_started
      notification-service:
        condition: service_started
      messaging-service:
        condition: service_started
    restart: on-failure
