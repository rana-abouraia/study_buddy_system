services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  user-service:
    build:
      context: ./backend/services/user-service
      args:
        DATABASE_URL: ${USER_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4001
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4001:4001"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  profile-service:
    build:
      context: ./backend/services/profile-service
      args:
        DATABASE_URL: ${PROFILE_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${PROFILE_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4002
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4002:4002"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  availability-service:
    build:
      context: ./backend/services/availability-service
      args:
        DATABASE_URL: ${AVAILABILITY_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${AVAILABILITY_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4003
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4003:4003"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  matching-service:
    build:
      context: ./backend/services/matching-service
      args:
        DATABASE_URL: ${MATCHING_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${MATCHING_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4004
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4004:4004"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  session-service:
    build:
      context: ./backend/services/session-service
      args:
        DATABASE_URL: ${SESSION_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${SESSION_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4005
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4005:4005"
    depends_on:
      kafka:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy --schema=prisma/schema.prisma && npm start"
    restart: on-failure

  notification-service:
    build:
      context: ./backend/services/notification-service
      args:
        DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
    env_file: ./backend/.env
    environment:
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      KAFKA_BROKER: kafka:9092
      KAFKA_BROKERS: kafka:9092
      PORT: 4006
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4006:4006"
