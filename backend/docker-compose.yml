services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    env_file:
      - ./services/user-service/.env
    ports:
      - "4001:4001"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  profile-service:
    build:
      context: ./services/profile-service
    container_name: profile-service
    env_file:
      - ./services/profile-service/.env
    ports:
      - "4002:4002"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  availability-service:
    build:
      context: ./services/availability-service
    container_name: availability-service
    env_file:
      - ./services/availability-service/.env
    ports:
      - "4003:4003"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  matching-service:
    build:
      context: ./services/matching-service
    container_name: matching-service
    env_file:
      - ./services/matching-service/.env
    ports:
      - "4004:4004"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  session-service:
    build:
      context: ./services/session-service
    container_name: session-service
    env_file:
      - ./services/session-service/.env
    ports:
      - "4005:4005"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    env_file:
      - ./services/notification-service/.env
    ports:
      - "4006:4006"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"

  messaging-service:
    build:
      context: ./services/messaging-service
    container_name: messaging-service
    env_file:
      - ./services/messaging-service/.env
    ports:
      - "4007:4007"
    depends_on:
      - kafka
    command: sh -c "npx prisma migrate deploy && npm start"